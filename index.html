<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Matthew Yang</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg1: #e8f4fd;
      --bg2: #fde8f4;
      --bg3: #f4fde8;
      --card: #ffffff;
      --blue: #2563eb;
      --pink: #e8187c;
      --green: #16a34a;
      --text: #0f172a;
      --muted: #94a3b8;
      --border: #e2e8f0;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #f0f4ff;
      background-image:
        radial-gradient(ellipse 70% 50% at 10% 10%, #dbeafe 0%, transparent 55%),
        radial-gradient(ellipse 60% 60% at 90% 90%, #fce7f3 0%, transparent 55%),
        radial-gradient(ellipse 50% 40% at 50% 50%, #dcfce7 0%, transparent 60%);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Outfit', sans-serif;
      padding: 24px;
    }

    .card {
      background: var(--card);
      border-radius: 28px;
      padding: 52px 60px;
      text-align: center;
      box-shadow:
        0 1px 2px rgba(0,0,0,0.04),
        0 8px 24px rgba(0,0,0,0.08),
        0 32px 64px rgba(0,0,0,0.06);
      min-width: 360px;
      animation: pop 0.5s cubic-bezier(.34,1.56,.64,1) both;
      border: 1.5px solid rgba(255,255,255,0.8);
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.88) translateY(16px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    .tag {
      display: inline-block;
      background: #eff6ff;
      color: var(--blue);
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 100px;
      border: 1px solid #bfdbfe;
      margin-bottom: 32px;
    }

    .rows {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .row {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      background: #f8fafc;
      border: 1.5px solid var(--border);
      border-radius: 16px;
      padding: 18px 22px;
      cursor: pointer;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
      text-align: left;
    }

    .row:hover {
      border-color: #93c5fd;
      background: #f0f7ff;
      box-shadow: 0 4px 16px rgba(37,99,235,0.08);
    }

    .row.checked-matthew {
      border-color: #fb7185;
      background: #fff1f3;
      box-shadow: 0 4px 20px rgba(232,24,124,0.1);
    }

    .row.checked-albert {
      border-color: #86efac;
      background: #f0fdf4;
      box-shadow: 0 4px 20px rgba(22,163,74,0.1);
    }

    .row-top {
      display: flex;
      align-items: center;
      gap: 16px;
      width: 100%;
    }

    .row input[type="checkbox"] { display: none; }

    .box {
      width: 26px;
      height: 26px;
      border-radius: 8px;
      border: 2px solid #cbd5e1;
      background: #fff;
      flex-shrink: 0;
      position: relative;
      transition: all 0.2s cubic-bezier(.34,1.56,.64,1);
    }

    .box::after {
      content: '';
      position: absolute;
      top: 3px; left: 7px;
      width: 8px; height: 13px;
      border-right: 2.5px solid #fff;
      border-bottom: 2.5px solid #fff;
      transform: rotate(45deg) scale(0);
      transform-origin: bottom right;
      transition: transform 0.18s cubic-bezier(.34,1.56,.64,1);
    }

    .row.checked-matthew .box {
      background: var(--pink);
      border-color: var(--pink);
      box-shadow: 0 0 0 4px rgba(232,24,124,0.15);
    }

    .row.checked-albert .box {
      background: var(--green);
      border-color: var(--green);
      box-shadow: 0 0 0 4px rgba(22,163,74,0.15);
    }

    .row.checked-matthew .box::after,
    .row.checked-albert .box::after {
      transform: rotate(45deg) scale(1);
    }

    .name {
      font-size: 28px;
      font-weight: 800;
      color: var(--text);
      letter-spacing: -0.5px;
      line-height: 1;
      transition: color 0.2s;
    }

    .row.checked-matthew .name { color: var(--pink); }
    .row.checked-albert .name  { color: var(--green); }

    .reveal {
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      width: 100%;
      transition: max-height 0.45s cubic-bezier(.16,1,.3,1), opacity 0.3s ease, margin-top 0.3s ease;
      margin-top: 0;
    }

    .reveal.show {
      max-height: 80px;
      opacity: 1;
      margin-top: 12px;
    }

    .reveal-pill {
      display: inline-block;
      font-size: 20px;
      font-weight: 700;
      padding: 8px 20px;
      border-radius: 100px;
      letter-spacing: 0.3px;
      animation: none;
    }

    .row.checked-matthew .reveal-pill {
      background: #fff1f3;
      color: var(--pink);
      border: 1.5px solid #fecdd3;
      animation: bounce 0.5s cubic-bezier(.34,1.56,.64,1) both;
    }

    .row.checked-albert .reveal-pill {
      background: #f0fdf4;
      color: var(--green);
      border: 1.5px solid #bbf7d0;
      animation: bounce 0.5s cubic-bezier(.34,1.56,.64,1) both;
    }

    @keyframes bounce {
      from { transform: scale(0.6); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }

    .confetti-container {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 10;
    }
    .dot {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="tag">Important Survey</div>

  <div class="rows">

    <label class="row" id="rowMatthew" for="theCheck">
      <div class="row-top">
        <input type="checkbox" id="theCheck" />
        <span class="box"></span>
        <span class="name">Matthew Yang</span>
      </div>
      <div class="reveal" id="revealMatthew">
        <span class="reveal-pill">you're gay 🏳️‍🌈</span>
      </div>
    </label>

    <label class="row" id="rowAlbert" for="albertCheck">
      <div class="row-top">
        <input type="checkbox" id="albertCheck" />
        <span class="box"></span>
        <span class="name">Albert Cho</span>
      </div>
      <div class="reveal" id="revealAlbert">
        <span class="reveal-pill">Oppa &#10084;&#65039;</span>
      </div>
    </label>

  </div>
</div>

<div class="confetti-container" id="confetti"></div>

<script>
  const matthewColors = ['#e8187c','#fb7185','#f472b6','#fda4af','#fce7f3'];
  const albertColors  = ['#16a34a','#4ade80','#86efac','#22c55e','#dcfce7'];

  function spawnConfetti(colors) {
    const el = document.getElementById('confetti');
    el.innerHTML = '';
    for (let i = 0; i < 55; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.style.left = Math.random() * 100 + 'vw';
      dot.style.top  = Math.random() * 50 + 25 + 'vh';
      dot.style.background = colors[Math.floor(Math.random() * colors.length)];
      const s = 7 + Math.random() * 10;
      dot.style.width  = s + 'px';
      dot.style.height = s + 'px';
      const tx  = (Math.random() - 0.5) * 340;
      const ty  = -(Math.random() * 380 + 80);
      const rot = Math.random() * 720;
      dot.style.opacity = '1';
      dot.style.transition = `transform ${0.7 + Math.random() * 0.7}s cubic-bezier(.2,.8,.4,1), opacity 0.4s ease ${0.65 + Math.random() * 0.3}s`;
      el.appendChild(dot);
      requestAnimationFrame(() => {
        dot.style.transform = `translate(${tx}px,${ty}px) rotate(${rot}deg)`;
        dot.style.opacity = '0';
      });
    }
  }

  document.getElementById('theCheck').addEventListener('change', function() {
    const row = document.getElementById('rowMatthew');
    const rev = document.getElementById('revealMatthew');
    if (this.checked) {
      row.classList.add('checked-matthew');
      rev.classList.add('show');
      spawnConfetti(matthewColors);
    } else {
      row.classList.remove('checked-matthew');
      rev.classList.remove('show');
    }
  });

  document.getElementById('albertCheck').addEventListener('change', function() {
    const row = document.getElementById('rowAlbert');
    const rev = document.getElementById('revealAlbert');
    if (this.checked) {
      row.classList.add('checked-albert');
      rev.classList.add('show');
      spawnConfetti(albertColors);
    } else {
      row.classList.remove('checked-albert');
      rev.classList.remove('show');
    }
  });
</script>
</body>
</html>
