<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Matthew Yang</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg: #0a0a0f;
      --card: #13131a;
      --accent: #ff3cac;
      --accent2: #7b2fff;
      --text: #f0eeff;
      --muted: #5a5a7a;
      --glow: rgba(255, 60, 172, 0.35);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'DM Sans', sans-serif;
      overflow: hidden;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 20%, rgba(123,47,255,0.18) 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 80% 80%, rgba(255,60,172,0.14) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 50% 50%, rgba(10,10,15,1) 0%, transparent 100%);
      z-index: 0;
    }

    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 150px;
      opacity: 0.4;
      pointer-events: none;
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: var(--card);
      border: 1px solid rgba(255,60,172,0.15);
      border-radius: 20px;
      padding: 56px 64px;
      text-align: center;
      box-shadow: 0 0 60px rgba(123,47,255,0.12), 0 0 120px rgba(255,60,172,0.06);
      animation: fadeUp 0.6s cubic-bezier(.16,1,.3,1) both;
      min-width: 340px;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .eyebrow {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 11px;
      letter-spacing: 4px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 28px;
    }

    .checkbox-wrap {
      display: inline-flex;
      align-items: center;
      gap: 18px;
      cursor: pointer;
      user-select: none;
    }

    .checkbox-wrap input[type="checkbox"] {
      display: none;
    }

    .custom-box {
      width: 28px;
      height: 28px;
      border: 2px solid var(--accent);
      border-radius: 7px;
      background: transparent;
      position: relative;
      flex-shrink: 0;
      transition: background 0.25s, box-shadow 0.25s;
    }

    .custom-box::after {
      content: '';
      position: absolute;
      top: 4px; left: 8px;
      width: 8px; height: 13px;
      border-right: 2.5px solid #fff;
      border-bottom: 2.5px solid #fff;
      transform: rotate(45deg) scale(0);
      transform-origin: bottom right;
      transition: transform 0.2s cubic-bezier(.34,1.56,.64,1);
    }

    input:checked ~ .custom-box {
      background: var(--accent);
      box-shadow: 0 0 18px var(--glow);
    }

    input:checked ~ .custom-box::after {
      transform: rotate(45deg) scale(1);
    }

    .label-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 36px;
      letter-spacing: 2px;
      color: var(--text);
      transition: color 0.3s;
    }

    .checkbox-wrap:hover .label-text {
      color: var(--accent);
    }

    .reveal {
      margin-top: 36px;
      overflow: hidden;
      max-height: 0;
      opacity: 0;
      transition: max-height 0.5s cubic-bezier(.16,1,.3,1), opacity 0.4s ease;
    }

    .reveal.show {
      max-height: 200px;
      opacity: 1;
    }

    .reveal-inner {
      padding-top: 8px;
      border-top: 1px solid rgba(255,60,172,0.2);
    }

    .reveal-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 52px;
      letter-spacing: 3px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: none;
    }

    .reveal.show .reveal-text {
      animation: pulse 1.6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { filter: brightness(1); }
      50%       { filter: brightness(1.4) drop-shadow(0 0 12px var(--glow)); }
    }

    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .dot {
      position: absolute;
      width: 8px; height: 8px;
      border-radius: 50%;
      opacity: 0;
    }
  </style>
</head>
<body>

<div class="card">
  <p class="eyebrow">Important Survey</p>

  <label class="checkbox-wrap" for="theCheck">
    <input type="checkbox" id="theCheck" />
    <span class="custom-box"></span>
    <span class="label-text">Matthew Yang</span>
  </label>

  <div class="reveal" id="reveal">
    <div class="reveal-inner">
      <div class="reveal-text">YOU'RE GAY</div>
    </div>
  </div>

  <label class="checkbox-wrap" style="margin-top: 28px;" for="albertCheck">
    <input type="checkbox" id="albertCheck" />
    <span class="custom-box"></span>
    <span class="label-text">Albert Cho</span>
  </label>

  <div class="reveal" id="revealAlbert">
    <div class="reveal-inner">
      <div class="reveal-text">Oppa&lt;3</div>
    </div>
  </div>
</div>

<div class="confetti-container" id="confetti"></div>

<script>
  const check = document.getElementById('theCheck');
  const reveal = document.getElementById('reveal');
  const confettiEl = document.getElementById('confetti');

  const colors = ['#ff3cac','#7b2fff','#ff6bde','#c45fff','#ff85e1','#f0eeff'];

  function spawnConfetti() {
    confettiEl.innerHTML = '';
    for (let i = 0; i < 60; i++) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.style.left = Math.random() * 100 + 'vw';
      dot.style.top = Math.random() * 40 + 30 + 'vh';
      dot.style.background = colors[Math.floor(Math.random() * colors.length)];
      const size = 6 + Math.random() * 10;
      dot.style.width = size + 'px';
      dot.style.height = size + 'px';
      const tx = (Math.random() - 0.5) * 300;
      const ty = -(Math.random() * 400 + 100);
      const rot = Math.random() * 720;
      dot.style.animation = 'none';
      dot.style.opacity = '1';
      dot.style.transition = `transform ${0.8 + Math.random() * 0.8}s cubic-bezier(.2,.8,.4,1), opacity ${0.4}s ease ${0.7 + Math.random() * 0.3}s`;
      confettiEl.appendChild(dot);
      requestAnimationFrame(() => {
        dot.style.transform = `translate(${tx}px, ${ty}px) rotate(${rot}deg)`;
        dot.style.opacity = '0';
      });
    }
  }

  check.addEventListener('change', () => {
    if (check.checked) {
      reveal.classList.add('show');
      spawnConfetti();
    } else {
      reveal.classList.remove('show');
    }
  });

  const albertCheck = document.getElementById('albertCheck');
  const revealAlbert = document.getElementById('revealAlbert');

  albertCheck.addEventListener('change', () => {
    if (albertCheck.checked) {
      revealAlbert.classList.add('show');
      spawnConfetti();
    } else {
      revealAlbert.classList.remove('show');
    }
  });
</script>
</body>
</html>
